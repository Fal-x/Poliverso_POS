version: "3.9"

services:
  db:
    image: postgres:15
    container_name: poliverse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: poliverse_db
      POSTGRES_USER: poliverse_app
      POSTGRES_PASSWORD: poliverse_password
      TZ: America/Bogota
    ports:
      - "5433:5432"
    volumes:
      - poliverse_db_data:/var/lib/postgresql/data

volumes:
  poliverse_db_data:
